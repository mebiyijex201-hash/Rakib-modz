<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BD TEAM VIP - WinGo 30sec Hack</title>

    <style>
        :root {
            --green: #00ff41;
            --red: #ff003c;
            --gold: #ffea00;
            --bg: #050505;
        }
        * {
            box-sizing: border-box;
            font-family: Segoe UI, system-ui;
        }
        body {
            margin: 0;
            background: var(--bg);
            color: #fff;
        }

        /* ================== LOADING SCREEN (VIP MODE RAKIB) ================== */
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000000 100%);
            z-index: 100000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #loading-screen.hidden {
            opacity: 0; visibility: hidden; pointer-events: none;
        }

        .loading-logo-container {
            position: relative;
            width: 130px; height: 130px;
            margin-bottom: 25px;
            animation: logoPulse 2s ease-in-out infinite;
        }
        .loading-logo-container img {
            width: 100%; height: 100%;
            border-radius: 20px;
            object-fit: cover;
            box-shadow: 0 0 40px rgba(0, 234, 255, 0.6), 0 0 80px rgba(0, 234, 255, 0.3);
        }
        .loading-ring {
            position: absolute; top: -12px; left: -12px; right: -12px; bottom: -12px;
            border: 4px solid transparent;
            border-top: 4px solid #00eaff;
            border-right: 4px solid #00eaff;
            border-radius: 50%;
            animation: ringSpin 1.4s linear infinite;
        }
        .loading-ring-2 {
            position: absolute; top: -22px; left: -22px; right: -22px; bottom: -22px;
            border: 3px solid transparent;
            border-bottom: 3px solid #ff0055;
            border-left: 3px solid #ff0055;
            border-radius: 50%;
            animation: ringSpinReverse 2s linear infinite;
        }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.06); } }
        @keyframes ringSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes ringSpinReverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }

        .loading-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 19px;
            color: #00eaff;
            letter-spacing: 4px;
            text-shadow: 0 0 20px rgba(0, 234, 255, 0.9);
            animation: textGlow 1.5s ease-in-out infinite alternate;
        }
        @keyframes textGlow {
            from { text-shadow: 0 0 10px rgba(0, 234, 255, 0.5); }
            to { text-shadow: 0 0 35px rgba(0, 234, 255, 1); }
        }

        .loading-bar {
            width: 220px; height: 5px;
            background: rgba(255,255,255,0.1);
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00eaff, #ff0055, #00eaff);
            background-size: 200% 100%;
            animation: loadingProgress 2.2s ease-in-out infinite, barShine 2s linear infinite;
            width: 0%;
        }
        @keyframes loadingProgress { 0% { width: 0%; } 50% { width: 75%; } 100% { width: 100%; } }
        @keyframes barShine { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .loading-dots {
            display: flex; gap: 9px; margin-top: 18px;
        }
        .loading-dot {
            width: 9px; height: 9px;
            background: #00eaff;
            border-radius: 50%;
            animation: dotBounce 1.4s ease-in-out infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* ================== তোমার পুরনো স্টাইল ================== */
        .header { background: linear-gradient(90deg, #2d44c5, #00d4ff); text-align: center; padding: 12px; font-weight: 900; letter-spacing: 2px; font-size: 18px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .card { max-width: 420px; margin: 15px auto; padding: 20px; border-radius: 22px; background: #0b0b0b; box-shadow: 0 0 30px #000; }
        .title { text-align: center; color: var(--gold); font-weight: 900; font-size: 20px; letter-spacing: 3px; }
        .game-name { text-align: center; color: #fff; font-size: 16px; margin-top: 5px; }
        .timer-box { text-align: center; background: #111; border-radius: 16px; padding: 12px; margin: 15px 0; }
        .timer { font-size: 48px; font-weight: 900; color: var(--gold); }
        .period { text-align: center; font-size: 14px; color: #aaa; margin-top: 8px; }
        .size { text-align: center; font-size: 78px; font-weight: 900; margin: 20px 0 10px; min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .size.small { color: var(--red); text-shadow: 0 0 15px var(--red); }
        .size.big { color: var(--green); text-shadow: 0 0 15px var(--green); }
        .hack-label { text-align: center; font-size: 14px; color: var(--gold); font-weight: 900; margin-bottom: 15px; background: rgba(255,234,0,0.2); padding: 6px; border-radius: 10px; }
        .admin h3 { text-align: center; color: var(--gold); font-size: 15px; }
        .btn { margin-top: 10px; width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 14px; font-weight: 900; color: #000; font-size: 17px; }

        /* Password Screen */
        #passwordScreen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #050505; display: flex; align-items: center; justify-content: center; z-index: 9999;
        }
        .password-box {
            background: #0b0b0b; padding: 40px 30px; border-radius: 22px; box-shadow: 0 0 40px #000;
            text-align: center; max-width: 340px; width: 90%;
        }
        .password-box h2 { color: var(--gold); }
        .password-box input {
            width: 100%; padding: 16px; margin: 15px 0; background: #111; border: 2px solid var(--gold);
            border-radius: 12px; color: #fff; font-size: 18px; text-align: center;
        }
        .password-box button {
            width: 100%; padding: 16px; background: var(--gold); border: none; border-radius: 14px;
            font-weight: 900; color: #000; font-size: 17px;
        }
        #errorMsg { color: var(--red); margin-top: 15px; }
    </style>
</head>
<body>

    <!-- LOADING SCREEN -->
    <div id="loading-screen">
        <div class="loading-logo-container">
            <div class="loading-ring"></div>
            <div class="loading-ring-2"></div>
            <img src="https://i.postimg.cc/2yVV7tsN/ba92c3aaab14d0d9d91d32467e96e8ae.jpg" alt="Logo">
        </div>
        <div class="loading-text">AI PREDICTION</div>
        <div class="loading-bar">
            <div class="loading-bar-fill"></div>
        </div>
        <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>

    <!-- Password Screen -->
    <div id="passwordScreen">
        <div class="password-box">
            <h2>🔐 VIP MODE RAKIB 🌐</h2>
            <p>ENTER LOGING KEY-🔑</p>
            <input type="password" id="passInput" placeholder="Enter Password" autocomplete="off">
            <button onclick="checkPassword()">Unlock Hack Tool</button>
            <div id="errorMsg"></div>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" style="display: none;">
        <div class="header">
            <span>BD TEAM VIP HACK SERVER</span>
            <span style="font-size:22px;">🚀</span>
        </div>

        <div class="card">
            <div class="title">BD™ OWNER RAKIB</div>
            <div class="game-name">WinGo 30sec - Live Market</div>

            <div class="timer-box">
                <div class="timer" id="timer">00:30</div>
                <div class="period" id="period">PERIOD: ------</div>
            </div>

            <div class="hack-label" id="hackLabel">
                🌐 SERVER CONNECTED ✅
            </div>

            <div id="size" class="size">WAIT</div>

            <div class="admin">
                <h3> HACK- UNDER 4 STEP WIN ✅</h3>
                <button class="btn" onclick="copyK()">ADMIN ID : @BD_TEAM_OWNER</button>
            </div>
        </div>
    </div>

    <script>
        // ================== LOADING SCREEN HIDE ==================
        window.addEventListener('load', function() {
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
            }, 2500);
        });

        // ================== PASSWORD ==================
        const CORRECT_PASSWORD = "vip_mode_by_rakib";

        function checkPassword() {
            const input = document.getElementById("passInput").value.trim();
            const error = document.getElementById("errorMsg");

            if (input === CORRECT_PASSWORD) {
                document.getElementById("passwordScreen").style.display = "none";
                document.getElementById("mainContent").style.display = "block";
            } else {
                error.textContent = "❌ ভুল পাসওয়ার্ড! আবার চেষ্টা করুন";
                document.getElementById("passInput").value = "";
            }
        }

        document.getElementById("passInput").addEventListener("keypress", e => {
            if (e.key === "Enter") checkPassword();
        });

        // ================== তোমার হ্যাক লজিক (যেটুকু দিয়েছিলে) ==================
        let runningPeriod = null;
        let prediction = null;
        let lastResult = null;
        let lossStreak = 0;

        const timerEl = document.getElementById("timer");
        const periodEl = document.getElementById("period");
        const sizeEl = document.getElementById("size");
        const hackLabel = document.getElementById("hackLabel");

        // Timer
        setInterval(() => {
            const sec = new Date().getSeconds();
            const remain = 30 - (sec % 30);
            timerEl.innerText = "00:" + String(remain).padStart(2, "0");
        }, 1000);

        // Main Logic
        setInterval(async () => {
            try {
                const res = await fetch("https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json");
                const json = await res.json();

                const last = json.data.list[0];
                const currentIssue = BigInt(last.issueNumber) + 1n;

                // Result Check
                if (currentIssue !== runningPeriod && runningPeriod !== null) {
                    const actualSize = last.number >= 5 ? "BIG" : "SMALL";

                    if (prediction === actualSize) {
                        lossStreak = 0;
                        hackLabel.innerHTML = `💥 বলছিলাম না <br>স্টেপ নিয়ে খেলবা আর কোপাবা ঠিক আছে 🛠️`;
                    } else {
                        lossStreak++;
                        hackLabel.innerHTML = `❌ LOSS<br><span style="color:#ffea00">`;
                    }
                }

                // New Prediction
                const trend = json.data.list.slice(0, 3).map(x => x.number >= 5 ? "BIG" : "SMALL");
                let newPrediction = trend.filter(x => x === "BIG").length >= 2 ? "BIG" : "SMALL";

                if (lossStreak >= 1) {
                    newPrediction = trend[0] === "BIG" ? "BIG" : "SMALL";
                }

                prediction = newPrediction;
                runningPeriod = currentIssue;

                periodEl.innerText = "PERIOD: " + currentIssue.toString().slice(-6);
                sizeEl.className = "size " + prediction.toLowerCase();
                sizeEl.innerText = prediction;

            } catch (e) {
                console.error("API Error");
            }
        }, 3000);

        function copyK() {
            alert("ADMIN ID Copied: @BD_TEAM_OWNER");
        }
    </script>
</body>
</html>
