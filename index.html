<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐑𝐀𝐊𝐈𝐁 𝐌𝐎𝐃𝐙 𝐕2.0- WIN/LOSS FIXED</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body, html { height: 100%; overflow: hidden; background: #000; }

        #web-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            z-index: 1;
        }

        #hackPanel {
            position: fixed;
            top: 150px;
            left: 50px;
            width: 280px;
            background: #0b0b0b;
            border-radius: 12px;
            z-index: 1000;
            cursor: move;
            user-select: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
        }

        #hackPanel.minimized {
            width: 50px;
            height: 50px;
            border-radius: 50%;
        }

        #hackPanel::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: conic-gradient(#ffea00, #00ff00, #00d4ff, #ff0000, #ffea00);
            animation: rotateRGB 3s linear infinite;
            z-index: -1;
        }

        @keyframes rotateRGB {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .inner-content {
            background: rgba(10, 10, 10, 0.98);
            margin: 2px;
            border-radius: 11px;
            padding: 12px;
            color: #fff;
            position: relative;
        }

        .min-btn {
            position: absolute;
            top: 5px;
            right: 12px;
            color: #ffea00;
            cursor: pointer;
            font-size: 24px;
            z-index: 1001;
        }

        .header-title {
            font-size: 14px;
            font-weight: bold;
            color: #ffea00;
            text-align: center;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .timer-tag {
            background: #ffea00;
            color: #000;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 10px;
            border-radius: 4px;
            margin: 0 auto 12px auto;
            display: table;
        }

        .signal-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 10px;
        }

        .status-box {
            width: 45px;
            height: 45px;
            border: 2px solid #444;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            color: #fff;
            transition: all 0.4s ease;
        }

        #predictionText {
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
        }

        .win-active { border-color: #00ff00 !important; box-shadow: 0 0 10px #00ff00; background: rgba(0,255,0,0.2); }
        .loss-active { border-color: #ff0000 !important; box-shadow: 0 0 10px #ff0000; background: rgba(255,0,0,0.2); }

        #authBox { margin-top: 15px; }
        input { width: 100%; padding: 8px; background: #1a1a1a; border: 1px solid #444; color: #fff; border-radius: 5px; margin-bottom: 8px; text-align: center; }
        .btn { width: 100%; padding: 10px; background: #ffea00; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; color: #000; }

        #mini-icon {
            display: none;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            color: #ffea00;
        }
    </style>
</head>
<body>

    <iframe id="web-container" src="https://www.hgnice.vip/#/register?invitationCode=656661788244"></iframe>

    <div id="hackPanel">
        <div class="inner-content" id="full-content">
            <span class="min-btn" onclick="toggleMinimize()">−</span>
            <div class="header-title">𝐑𝐀𝐊𝐈𝐁 𝐌𝐎𝐃𝐙</div>
            <div class="timer-tag" id="timer">ANALYZING</div>

            <div class="signal-container">
                <div id="statusLeft" class="status-box"></div>
                <div id="predictionText">🆆🅰︎🅸🆃</div>
                <div id="statusRight" class="status-box"></div>
            </div>

            <div id="authBox">
                <input type="password" id="pass" placeholder="PASSWORD">
                <button class="btn" onclick="startHack()">ACTIVATE</button>
            </div>
        </div>
        <div id="mini-icon" onclick="toggleMinimize()">𝐁𝐃𝓽𝓶</div>
    </div>

    <script>
        const PASSWORD = "123";
        let isMinimized = false;
        let lastSignal = "";
        let currentPeriod = ""; 

        function toggleMinimize() {
            const panel = document.getElementById('hackPanel');
            const full = document.getElementById('full-content');
            const mini = document.getElementById('mini-icon');
            isMinimized = !isMinimized;
            if(isMinimized) {
                panel.classList.add('minimized');
                full.style.display = 'none';
                mini.style.display = 'flex';
            } else {
                panel.classList.remove('minimized');
                full.style.display = 'block';
                mini.style.display = 'none';
            }
        }

        function startHack() {
            if(document.getElementById('pass').value === PASSWORD) {
                document.getElementById('authBox').style.display = 'none';
                runLogic();
            } else { alert("Wrong Password!"); }
        }

        async function fetchResult() {
            try {
                const response = await fetch('https://draw.ar-lottery01.com/WinGo/WinGo_30S/GetHistoryIssuePage.json');
                const json = await response.json();
                return json.data.list[0];
            } catch (e) { return null; }
        }

        async function runLogic() {
            const display = document.getElementById('predictionText');
            const timer = document.getElementById('timer');
            const boxL = document.getElementById('statusLeft');
            const boxR = document.getElementById('statusRight');

            setInterval(async () => {
                let sec = new Date().getSeconds();
                let rem = 30 - (sec % 30);
                timer.innerText = rem + "S";

                // যখন নতুন রাউন্ড শুরু হয় (rem = 29 বা 28)
                if (rem === 28 && lastSignal === "") {
                    // নতুন সিগন্যাল তৈরি
                    lastSignal = Math.random() > 0.5 ? "𝐁𝐈𝐆" : "𝐒𝐌𝐀𝐋𝐋";
                    display.innerText = lastSignal;
                    display.style.color = lastSignal === "𝐁𝐈𝐆" ? "#00ff00" : "#ff0000";
                    
                    // রেজাল্ট আসার আগে বক্স খালি করে রাখা (ঐচ্ছিক)
                    // boxL.innerText = boxR.innerText = "";
                    // boxL.className = "status-box"; boxR.className = "status-box";
                }

                // যখন সময় শেষ হয় (rem = 1 বা 0) তখন রেজাল্ট চেক করার জন্য সার্ভার কল করা শুরু হবে
                if (rem <= 2 && rem >= 0) {
                    const resultData = await fetchResult();
                    if (resultData) {
                        const actualResult = parseInt(resultData.number) < 5 ? "𝐒𝐌𝐀𝐋𝐋" : "𝐁𝐈𝐆";
                        
                        // যদি আমরা গত সিগন্যালের ফলাফল এখনো না দেখিয়ে থাকি
                        if (lastSignal !== "") {
                            if (lastSignal === actualResult) {
                                boxL.innerText = boxR.innerText = "W";
                                boxL.className = boxR.className = "status-box win-active";
                            } else {
                                boxL.innerText = boxR.innerText = "L";
                                boxL.className = boxR.className = "status-box loss-active";
                            }
                            // রেজাল্ট দেখানো শেষ, সিগন্যাল ক্লিয়ার করি যাতে পরের রাউন্ডে আবার নতুন সিগন্যাল আসে
                            lastSignal = ""; 
                        }
                    }
                }
            }, 1000);
        }

        // ড্র্যাগিং কোড (মোবাইল ও পিসি)
        const panel = document.getElementById("hackPanel");
        let active = false, currentX, currentY, initialX, initialY, xOffset = 0, yOffset = 0;

        function dragStart(e) {
            const clientX = e.type === "touchstart" ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === "touchstart" ? e.touches[0].clientY : e.clientY;
            initialX = clientX - xOffset;
            initialY = clientY - yOffset;
            if (e.target === panel || panel.contains(e.target)) active = true;
        }
        function dragEnd() { active = false; }
        function drag(e) {
            if (active) {
                e.preventDefault();
                const clientX = e.type === "touchmove" ? e.touches[0].clientX : e.clientX;
                const clientY = e.type === "touchmove" ? e.touches[0].clientY : e.clientY;
                currentX = clientX - initialX;
                currentY = clientY - initialY;
                xOffset = currentX; yOffset = currentY;
                panel.style.transform = `translate3d(${currentX}px, ${currentY}px, 0)`;
            }
        }
        panel.addEventListener("mousedown", dragStart);
        document.addEventListener("mouseup", dragEnd);
        document.addEventListener("mousemove", drag);
        panel.addEventListener("touchstart", dragStart);
        document.addEventListener("touchend", dragEnd);
        document.addEventListener("touchmove", drag);
    </script>
</body>
</html>
